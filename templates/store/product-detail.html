{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-content padding-y bg">
<div class="container">

<div class="row">
	<div class="col-md-6">
		{% if product.images %}
		<img src="{{ product.images.url }}" class="border img-fluid">
		{% endif %}
	</div>
	<div class="col-md-6">
		<h2 class="title">{{ product.product_name }}</h2>
		<p class="price mt-3 h3">${{ product.price }}</p>
		<p class="mt-3">{{ product.description }}</p>
		<p class="mt-2"><strong>Stock:</strong> {{ product.stock }}</p>
		<p class="mt-2"><strong>Categoría:</strong> {{ product.category }}</p>
		<a href="#" class="btn btn-primary btn-block mt-4">Add to cart</a>
	</div>
</div>

</div>
</section>
{% endblock %}
