{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-conten padding-y bg" style="min-height:80vh">
<div class="container">
	<div class="card mx-auto" style="max-width: 500px; margin-top:40px;">
		<div class="card-body">
			<h4 class="card-title mb-4">Create Account</h4>
			<form method="post" action="{% url 'register' %}">
				{% csrf_token %}
				<div class="form-row">
					<div class="form-group col-md-6">
						<label>First name</label>
						<input type="text" name="first_name" class="form-control">
					</div>
					<div class="form-group col-md-6">
						<label>Last name</label>
						<input type="text" name="last_name" class="form-control">
					</div>
				</div>
				<div class="form-group">
					<label>Email</label>
					<input type="email" name="email" class="form-control">
				</div>
				<div class="form-group">
					<label>Username</label>
					<input type="text" name="username" class="form-control">
				</div>
				<div class="form-group">
					<label>Password</label>
					<input type="password" name="password" class="form-control">
				</div>
				<button type="submit" class="btn btn-primary btn-block">Register</button>
			</form>
		</div>
	</div>
	<p class="text-center mt-4">Already have an account? <a href="{% url 'signin' %}">Sign in</a></p>
</div>
</section>
{% endblock %}
