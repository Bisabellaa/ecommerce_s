{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-conten padding-y bg" style="min-height:80vh">
<div class="container">
	<div class="card mx-auto" style="max-width: 500px; margin-top:40px;">
		<div class="card-body">
			<h4 class="card-title mb-4">Crear cuenta</h4>
			<form method="post" action="{% url 'register' %}">
				{% csrf_token %}
				<div class="form-row">
					<div class="form-group col-md-6">
						<label>Nombre</label>
						<input type="text" name="first_name" class="form-control">
					</div>
					<div class="form-group col-md-6">
						<label>Apellido</label>
						<input type="text" name="last_name" class="form-control">
					</div>
				</div>
				<div class="form-group">
					<label>Email</label>
					<input type="email" name="email" class="form-control">
				</div>
				<div class="form-group">
					<label>Usuario</label>
					<input type="text" name="username" class="form-control">
				</div>
				<div class="form-group">
					<label>Clave</label>
					<input type="password" name="password" class="form-control">
				</div>
				<button type="submit" class="btn btn-primary btn-block">Registrar</button>
			</form>
		</div>
	</div>
	<p class="text-center mt-4"> Ya tienes una cuenta? <a href="{% url 'signin' %}">Iniciar</a></p>
</div>
</section>
{% endblock %}
