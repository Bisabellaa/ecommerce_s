{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-conten padding-y bg" style="min-height:80vh">
<div class="container">
	<div class="card mx-auto" style="max-width: 380px; margin-top:40px;">
		<div class="card-body">
			<h4 class="card-title mb-4">Iniciar Sesion</h4>
			<form method="post" action="{% url 'signin' %}">
				{% csrf_token %}
				<div class="form-group">
					<label>Correo Electronico</label>
					<input type="email" name="email" class="form-control" placeholder="Email">
				</div>
				<div class="form-group">
					<label>Clave</label>
					<input type="password" name="password" class="form-control" placeholder="Password">
				</div>
				<button type="submit" class="btn btn-primary btn-block">Iniciar</button>
			</form>
		</div>
	</div>
	<p class="text-center mt-4">No tiene una cuenta? <a href="{% url 'register' %}">Registarse</a></p>
</div>
</section>
{% endblock %}
